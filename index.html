<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="5 Year">
<meta name="theme-color" content="#F0E8DC">
<title>5 Year ♡</title>

<!-- PWA Manifest inline via blob -->
<script>
  const manifest = {
    name: "5 Year",
    short_name: "5 Year",
    description: "March 14, 2026 — A day worth remembering.",
    start_url: ".",
    display: "standalone",
    background_color: "#F0E8DC",
    theme_color: "#F0E8DC",
    orientation: "portrait",
    icons: [
      {
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23F0E8DC'/%3E%3Ctext x='256' y='320' text-anchor='middle' font-size='280' font-family='serif'%3E%E2%99%A1%3C/text%3E%3C/svg%3E",
        sizes: "512x512",
        type: "image/svg+xml",
        purpose: "any maskable"
      }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
  const manifestURL = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = manifestURL;
  document.currentScript.parentNode.insertBefore(link, document.currentScript);
</script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Caveat:wght@400;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #F0E8DC;
    --paper:  #FAF6EF;
    --ink:    #1C1612;
    --muted:  #8A7968;
    --rule:   #DDD4C4;
    --shadow: rgba(60, 40, 20, 0.12);

    --c1:  #D4541A;
    --c2:  #2E6B50;
    --c3:  #A0461C;
    --c4:  #1F4F82;
    --c5:  #6B3A8C;
    --c6:  #C4921A;
    --c7:  #8C3A3A;
    --c8:  #3A6B6B;
    --cr1: #D4541A;
    --cr2: #2E6B50;
    --cr3: #A0461C;
    --cr4: #1F4F82;
    --cr5: #6B3A8C;
  }

  html { height: 100%; }

  body {
    height: 100%;
    min-height: 100dvh;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  /* grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  /* ── SPLASH SCREEN ── */
  #splash {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 500;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #splash.hide {
    opacity: 0;
    transform: scale(1.04);
    pointer-events: none;
  }
  .splash-heart {
    font-size: 3rem;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .splash-title {
    font-family: 'Caveat', cursive;
    font-size: 2.2rem;
    font-weight: 600;
    color: var(--ink);
    text-align: center;
  }
  .splash-date {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .splash-sub {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 4px;
  }
  .splash-btn {
    margin-top: 24px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 100px;
    padding: 14px 36px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .splash-btn:active { transform: scale(0.96); opacity: 0.85; }
  .splash-divider {
    width: 32px;
    height: 1px;
    background: var(--rule);
    margin: 4px 0;
  }

  /* ── MAIN APP ── */
  #app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top, 12px) 16px max(env(safe-area-inset-bottom, 12px), 12px);
    padding-top: max(env(safe-area-inset-top, 12px), 16px);
    gap: 12px;
  }

  /* ── TOP BAR ── */
  .topbar {
    width: 100%;
    max-width: 420px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .topbar-left {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .topbar-title {
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--ink);
  }
  .topbar-sub {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .topbar-home {
    background: none;
    border: none;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 6px;
    border-radius: 50%;
    color: var(--muted);
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .topbar-home:active { color: var(--ink); }

  /* ── SECTION PILLS ── */
  .section-pills {
    display: flex;
    gap: 6px;
    width: 100%;
    max-width: 420px;
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .section-pills::-webkit-scrollbar { display: none; }
  .pill {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    border: 1.5px solid var(--rule);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .pill.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  /* ── DOTS ── */
  .dots {
    display: flex;
    gap: 5px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 420px;
    width: 100%;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--rule);
    transition: all 0.3s ease;
    cursor: pointer;
    flex-shrink: 0;
  }
  .dot.active {
    background: var(--card-accent, var(--ink));
    width: 18px;
    border-radius: 3px;
  }
  .dot.visited { background: var(--muted); opacity: 0.4; }

  /* ── CARD AREA ── */
  .card-area {
    flex: 1;
    width: 100%;
    max-width: 420px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .card-ghost {
    position: absolute;
    width: calc(100% - 28px);
    height: 94%;
    background: var(--paper);
    border-radius: 26px;
  }
  .card-ghost-2 { transform: translateY(10px) scale(0.94); opacity: 0.45; box-shadow: 0 4px 20px var(--shadow); }
  .card-ghost-1 { transform: translateY(5px) scale(0.97); opacity: 0.7; box-shadow: 0 4px 20px var(--shadow); }

  /* ── CARD ── */
  .card {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--paper);
    border-radius: 26px;
    box-shadow: 0 8px 48px var(--shadow), 0 2px 8px var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    will-change: transform, opacity;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }
  .card:active { cursor: grabbing; }

  .card.anim-slide-left  { animation: slideLeft  0.32s cubic-bezier(0.4, 0, 0.6, 1) forwards; }
  .card.anim-slide-right { animation: slideRight 0.32s cubic-bezier(0.4, 0, 0.6, 1) forwards; }
  .card.anim-enter-left  { animation: enterLeft  0.38s cubic-bezier(0.34, 1.42, 0.64, 1) forwards; }
  .card.anim-enter-right { animation: enterRight 0.38s cubic-bezier(0.34, 1.42, 0.64, 1) forwards; }

  @keyframes slideLeft  { to { transform: translateX(-112%) rotate(-5deg); opacity: 0; } }
  @keyframes slideRight { to { transform: translateX(112%) rotate(5deg); opacity: 0; } }
  @keyframes enterLeft  { from { transform: translateX(112%) rotate(5deg); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes enterRight { from { transform: translateX(-112%) rotate(-5deg); opacity: 0; } to { transform: none; opacity: 1; } }

  .card-stripe {
    height: 7px;
    background: var(--card-accent);
    border-radius: 26px 26px 0 0;
    flex-shrink: 0;
  }

  .card-head {
    padding: 14px 20px 11px;
    flex-shrink: 0;
  }
  .stop-label {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--card-accent);
    font-weight: 500;
    margin-bottom: 3px;
  }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.45rem, 5vw, 1.75rem);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.05;
    margin-bottom: 3px;
  }
  .card-address {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 300;
  }
  .card-address-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .maps-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--card-accent);
    color: white;
    text-decoration: none;
    font-size: 0.75rem;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .maps-link:active { transform: scale(0.9); opacity: 0.8; }

  .card-divider {
    height: 1px;
    background: var(--rule);
    margin: 0 20px;
    flex-shrink: 0;
  }

  .card-body {
    padding: 13px 20px 16px;
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 11px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    overscroll-behavior: contain;
  }
  .card-body::-webkit-scrollbar { display: none; }

  .section-label {
    font-size: 0.57rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 5px;
  }

  .story {
    font-size: 0.86rem;
    line-height: 1.68;
    color: #3A2E22;
    font-weight: 300;
  }

  .fact {
    background: #F2EAD8;
    border-radius: 14px;
    padding: 10px 13px;
    border-left: 3px solid var(--card-accent);
  }
  .fact-label {
    font-size: 0.57rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--card-accent);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .fact-text {
    font-size: 0.82rem;
    line-height: 1.58;
    color: #3A2E22;
    font-weight: 300;
  }

  .order-list { display: flex; flex-direction: column; gap: 7px; }
  .order-item { display: flex; gap: 10px; align-items: flex-start; }
  .order-pill {
    background: var(--card-accent);
    color: white;
    font-size: 0.58rem;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
    margin-top: 2px;
    letter-spacing: 0.04em;
  }
  .order-name { font-size: 0.84rem; font-weight: 500; color: var(--ink); line-height: 1.3; }
  .order-desc { font-size: 0.73rem; color: var(--muted); font-style: italic; margin-top: 1px; line-height: 1.4; }

  /* Aire baths */
  .bath-list { display: flex; flex-direction: column; gap: 6px; }
  .bath-item { display: flex; gap: 10px; align-items: center; }
  .bath-tag {
    background: var(--card-accent);
    color: white;
    font-size: 0.52rem;
    font-weight: 500;
    padding: 3px 7px;
    border-radius: 20px;
    flex-shrink: 0;
    letter-spacing: 0.06em;
    min-width: 42px;
    text-align: center;
  }
  .bath-name { font-size: 0.84rem; font-weight: 500; color: var(--ink); }
  .bath-desc { font-size: 0.72rem; color: var(--muted); font-style: italic; }

  /* Overview card */
  .overview-subtitle {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.06em;
    margin-top: 3px;
  }
  .overview-items {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }
  .overview-item {
    background: #F2EAD8;
    border-radius: 16px;
    padding: 13px 15px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .overview-emoji {
    font-size: 1.4rem;
    flex-shrink: 0;
    line-height: 1.2;
  }
  .overview-content {}
  .overview-time {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--card-accent);
    font-weight: 600;
    margin-bottom: 3px;
  }
  .overview-desc {
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--ink);
    font-weight: 300;
  }
  .round-hero {
    text-align: center;
    padding: 4px 0 8px;
  }
  .round-big {
    font-family: 'Caveat', cursive;
    font-size: clamp(4rem, 16vw, 5rem);
    font-weight: 600;
    color: var(--card-accent);
    opacity: 0.13;
    line-height: 1;
    margin-bottom: -10px;
  }
  .round-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 5.5vw, 1.85rem);
    font-weight: 700;
    font-style: normal;
    color: var(--ink);
    line-height: 1.2;
  }
  .round-desc {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 400;
    font-style: normal;
  }
  .question-list { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
  .question-item {
    background: #F2EAD8;
    border-radius: 16px;
    padding: 13px 15px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .q-num {
    font-family: 'Caveat', cursive;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--card-accent);
    line-height: 1.1;
    flex-shrink: 0;
    min-width: 18px;
  }
  .q-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--ink);
    font-style: normal;
    font-weight: 400;
  }

  /* ── NAV ── */
  .nav {
    width: 100%;
    max-width: 420px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    padding: 0 2px;
  }
  .nav-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: none;
    background: var(--paper);
    box-shadow: 0 2px 14px var(--shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.15rem;
    color: var(--ink);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .nav-btn:active { transform: scale(0.9); }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }
  .nav-info { text-align: center; }
  .nav-counter {
    display: block;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .nav-section-name {
    display: block;
    font-size: 0.62rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 1px;
    opacity: 0.7;
  }

  /* ── INSTALL BANNER ── */
  #install-banner {
    position: fixed;
    bottom: max(env(safe-area-inset-bottom, 0px), 0px);
    left: 0; right: 0;
    background: var(--ink);
    color: var(--paper);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #install-banner.show { transform: translateY(0); }
  .install-text { font-size: 0.8rem; line-height: 1.4; }
  .install-text strong { display: block; font-size: 0.85rem; margin-bottom: 2px; }
  .install-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .install-btn {
    padding: 8px 14px;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 500;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .install-btn.primary { background: var(--paper); color: var(--ink); }
  .install-btn.dismiss { background: transparent; color: rgba(255,255,255,0.5); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .topbar-walkq {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--rule);
    border-radius: 50px;
    height: 32px;
    padding: 0 10px;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 2px;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .topbar-walkq:active { opacity: 0.7; }
  #walkq-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(30,24,18,0.72);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.35s ease;
  }
  #walkq-overlay.open { opacity: 1; }
  #walkq-card {
    background: var(--paper);
    border-radius: 26px;
    padding: 40px 28px 36px;
    margin: 20px;
    max-width: 380px;
    width: calc(100% - 40px);
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    gap: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    transform: translateY(20px); transition: transform 0.35s ease;
  }
  #walkq-overlay.open #walkq-card { transform: translateY(0); }
  #walkq-close {
    position: absolute; top: 16px; right: 18px;
    background: none; border: none;
    font-size: 18px; color: var(--ink); opacity: 0.4;
    cursor: pointer; padding: 4px 8px;
  }
  #walkq-eyebrow {
    font-family: 'Caveat', cursive;
    font-size: 22px; color: var(--ink); opacity: 0.45;
    letter-spacing: 0.02em;
  }
  #walkq-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 5vw, 22px); font-weight: 700;
    color: var(--ink); text-align: center;
    line-height: 1.4;
    min-height: 80px;
    display: flex; align-items: center; justify-content: center;
  }
  #walkq-next {
    background: var(--ink); color: var(--paper);
    border: none; border-radius: 50px;
    padding: 14px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.02em;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #walkq-next:active { opacity: 0.75; }

</style>
</head>
<body>

<!-- ARE WE THERE YET OVERLAY -->
<div id="walkq-overlay" style="display:none">
  <div id="walkq-card">
    <button id="walkq-close">✕</button>
    <div id="walkq-eyebrow">Are We There Yet?</div>
    <div id="walkq-text"></div>
    <button id="walkq-next">✦ Shuffle</button>
  </div>
</div>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-heart">♡</div>
  <div class="splash-title">Happy 5 Year Anniversary</div>
  <div class="splash-divider"></div>
  <button class="splash-btn" id="splash-btn">Let's go →</button>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">5 Year ♡</div>
      <div class="topbar-sub" id="topbar-sub">Mar 14, 2026</div>

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderCard(data) {
  const accent = `var(${data.accent})`;

  if (data.type === 'overview') {
    cardEl.innerHTML = `

        <div class="card-name">${data.name}</div>

      <div class="card-body">

  } else if (data.type === 'stop' || data.type === 'terroir') {
    cardEl.innerHTML = `
      <div class="card-stripe"></div>
      <div class="card-head">
        <div class="stop-label">${data.label}</div>

        </div>
        ${data.fact ? `<div class="fact">

          <div class="section-label">${data.ordersLabel || 'Order This'}</div>

              <div class="order-item">
                <span class="order-pill">${i+1}</span>

        </div>

  } else if (data.type === 'aire') {
    cardEl.innerHTML = `
      <div class="card-stripe"></div>
      <div class="card-head">
        <div class="stop-label">${data.label}</div>

function buildDots() {
  const section = cards[current].section;
  const sectionCards = cards.filter(c => c.section === section);
  const sectionStart = cards.findIndex(c => c.section === section);
  const localIndex = current - sectionStart;

  dotsEl.innerHTML = '';
  dotsEl.style.setProperty('--card-accent', `var(${cards[current].accent})`);

  sectionCards.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === localIndex ? ' active' : i < localIndex ? ' visited' : '');
    d.onclick = () => goTo(sectionStart + i);
    dotsEl.appendChild(d);
  });
}

function buildPills() {
  pillsEl.innerHTML = '';
  sections.forEach(sec => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (sec === cards[current].section ? ' active' : '');
    btn.textContent = sec;
    btn.onclick = () => {
      const idx = cards.findIndex(c => c.section === sec);
      goTo(idx);
    };
    pillsEl.appendChild(btn);
  });
}

function updateNav() {
  counterEl.textContent = `${current + 1} / ${cards.length}`;
  navSec.textContent = cards[current].section;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === cards.length - 1;
  topbarSub.textContent = cards[current].section;
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function goTo(index, dir) {
  if (isAnimating || index < 0 || index >= cards.length || index === current) return;
  isAnimating = true;

  const direction = dir || (index > current ? 'left' : 'right');
  const exitAnim  = direction === 'left' ? 'anim-slide-left' : 'anim-slide-right';
  const enterAnim = direction === 'left' ? 'anim-enter-left' : 'anim-enter-right';

  cardEl.classList.add(exitAnim);

  setTimeout(() => {
    current = index;
    cardEl.className = 'card';
    renderCard(cards[current]);
    buildDots();
    buildPills();
    updateNav();

    // scroll card body to top
    const body = cardEl.querySelector('.card-body');
    if (body) body.scrollTop = 0;

    requestAnimationFrame(() => {
      cardEl.classList.add(enterAnim);
      setTimeout(() => {
        cardEl.classList.remove(enterAnim);
        isAnimating = false;
      }, 400);
    });
  }, 300);
}

// ── SWIPE ──────────────────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0, touchStartScrollTop = 0;
let swipeBlocked = false;

cardEl.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  const body = cardEl.querySelector('.card-body');
  touchStartScrollTop = body ? body.scrollTop : 0;
  swipeBlocked = false;
}, { passive: true });

cardEl.addEventListener('touchmove', e => {
  const dx = Math.abs(e.touches[0].clientX - touchStartX);
  const dy = Math.abs(e.touches[0].clientY - touchStartY);
  // if scrolling vertically, block swipe
  if (dy > dx && dy > 8) swipeBlocked = true;
}, { passive: true });

cardEl.addEventListener('touchend', e => {
  if (swipeBlocked) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 44) {
    if (dx < 0) goTo(current + 1, 'left');
    else goTo(current - 1, 'right');
  }
}, { passive: true });

// ── BUTTONS ────────────────────────────────────────────────────────────────
prevBtn.onclick = () => goTo(current - 1, 'right');
nextBtn.onclick = () => goTo(current + 1, 'left');
document.getElementById('home-btn').onclick = () => {
  goTo(0, 'right');
  const splash = document.getElementById('splash');
  splash.style.display = 'flex';
  splash.style.opacity = '0';
  splash.style.transform = 'scale(1.04)';
  requestAnimationFrame(() => {
    splash.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
    splash.style.opacity = '1';
    splash.style.transform = 'scale(1)';
    splash.classList.remove('hide');
  });
};

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goTo(current + 1, 'left');
  if (e.key === 'ArrowLeft')  goTo(current - 1, 'right');
});

// ── SPLASH ─────────────────────────────────────────────────────────────────
document.getElementById('splash-btn').onclick = () => {
  document.getElementById('splash').classList.add('hide');

    document.getElementById('splash').style.display = 'none';

      setTimeout(() => {

};

document.getElementById('install-dismiss').onclick = () => {
  document.getElementById('install-banner').classList.remove('show');

  let idx;
  do { idx = Math.floor(Math.random() * walkQuestions.length); }
  while (idx === lastQIndex && walkQuestions.length > 1);
  lastQIndex = idx;
  showQuestion(walkQuestions[idx]);
}

function showQuestion(text) {
  const qEl = document.getElementById('walkq-text');
  qEl.style.opacity = '0';
  qEl.style.transform = 'translateY(10px)';
  setTimeout(() => {
    qEl.textContent = text;
    qEl.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    qEl.style.opacity = '1';
    qEl.style.transform = 'translateY(0)';
  }, 150);
}

document.getElementById('walkq-next').onclick = pickRandom;
document.getElementById('walkq-close').onclick = closeWalkQ;
document.getElementById('walkq-btn').onclick = openWalkQ;

// ── INIT ───────────────────────────────────────────────────────────────────
renderCard(cards[0]);
buildDots();
buildPills();
updateNav();
</script>

<!-- SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'brooklyn-day-v1';
    const FONTS = [
      'https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Caveat:wght@400;600&display=swap'
    ];

    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(cache => cache.addAll(FONTS)).catch(() => {})
      );
      self.skipWaiting();
    });

    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        )
      );
      self.clients.claim();
    });

    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(cached => {
          if (cached) return cached;
          return fetch(e.request).then(res => {
            if (!res || res.status !== 200) return res;
            const clone = res.clone();
            caches.open(CACHE).then(cache => cache.put(e.request, clone));
            return res;
          }).catch(() => cached);
        })
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swURL = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL).catch(() => {});
}
</script>
